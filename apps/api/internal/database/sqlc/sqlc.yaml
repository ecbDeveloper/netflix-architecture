version: "2"
sql:
  - engine: "postgresql"
    queries: "../queries"
    schema: "../migrations"
    gen:
      go:
        emit_json_tags: true
        out: "."
        package: "sqlc"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "integer"
            go_type: "int"
          - db_type: "date"
            go_type: "time.Time"
