services:
  api_db:
    container_name: api_db
    image: postgres:18-alpine
    ports:
      - ${API_DB_PORT}:5432
    environment:
      POSTGRES_DB: ${API_DB_NAME}
      POSTGRES_USER: ${API_DB_USER}
      POSTGRES_PASSWORD: ${API_DB_PASS}
    volumes:
      - api-postgres-data:/var/lib/postgresql/18/data

  history_db:
    container_name: history_db
    image: postgres:18-alpine
    ports:
      - ${HISTORY_DB_PORT}:5432
    environment:
      POSTGRES_DB: ${HISTORY_DB_NAME}
      POSTGRES_USER: ${HISTORY_DB_USER}
      POSTGRES_PASSWORD: ${HISTORY_DB_PASS}
    volumes:
      - history-postgres-data:/var/lib/postgresql/18/data

  recomendation_db:
    container_name: recomendation_db
    image: postgres:18-alpine
    ports:
      - ${RECOMENDATION_DB_PORT}:5432
    environment:
      POSTGRES_DB: ${RECOMENDATION_DB_NAME}
      POSTGRES_USER: ${RECOMENDATION_DB_USER}
      POSTGRES_PASSWORD: ${RECOMENDATION_DB_PASS}
    volumes:
      - recomendation-postgres-data:/var/lib/postgresql/18/data

  redis:
    container_name: netflix_redis
    image: redis:alpine3.23
    command: redis-server --requirepass ${REDIS_PASS}
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - redis-data:/data

  api:
    container_name: api
    ports:
      - "${API_PORT}:${API_PORT}"
    build:
      context: ./apps/api
    env_file: ./apps/api/.env
    depends_on:
      - api_db
      - redis

volumes:
  api-postgres-data:
  history-postgres-data:
  recomendation-postgres-data:
  redis-data:
