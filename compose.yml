services:
  api_db:
    container_name: api_db
    image: postgres:18-alpine
    ports:
      - ${API_DB_PORT}:5432
    environment:
      POSTGRES_DB: ${API_DB_NAME}
      POSTGRES_USER: ${API_DB_USER}
      POSTGRES_PASSWORD: ${API_DB_PASS}
    volumes:
      - api-postgres-data:/var/lib/postgresql/18/data

  history_db:
    container_name: history_db
    image: postgres:18-alpine
    ports:
      - ${HISTORY_DB_PORT}:5432
    environment:
      POSTGRES_DB: ${HISTORY_DB_NAME}
      POSTGRES_USER: ${HISTORY_DB_USER}
      POSTGRES_PASSWORD: ${HISTORY_DB_PASS}
    volumes:
      - history-postgres-data:/var/lib/postgresql/18/data

  recommendation_db:
    container_name: recommendation_db
    image: postgres:18-alpine
    ports:
      - ${RECOMMENDATION_DB_PORT}:5432
    environment:
      POSTGRES_DB: ${RECOMMENDATION_DB_NAME}
      POSTGRES_USER: ${RECOMMENDATION_DB_USER}
      POSTGRES_PASSWORD: ${RECOMMENDATION_DB_PASS}
    volumes:
      - recommendation-postgres-data:/var/lib/postgresql/18/data

  redis:
    container_name: redis
    image: redis:alpine3.23
    command: redis-server --requirepass ${REDIS_PASS}
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - redis-data:/data

  api:
    container_name: api
    ports:
      - ${API_PORT}:${API_PORT}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: ./apps/api/.env
    depends_on:
      - api_db
      - redis
      - history_ms
      - recommendation_ms

  history_ms:
    container_name: history_ms
    ports:
      - ${HISTORY_MS_PORT}:${HISTORY_MS_PORT}
    build:
      context: .
      dockerfile: apps/history_ms/Dockerfile
    env_file: ./apps/history_ms/.env
    depends_on:
      - history_db

  recommendation_ms:
    container_name: recommendation_ms
    ports:
      - ${RECOMMENDATION_MS_PORT}:${RECOMMENDATION_MS_PORT}
    build:
      context: .
      dockerfile: apps/recommendation_ms/Dockerfile
    env_file: ./apps/recommendation_ms/.env
    depends_on:
      - recommendation_db
      - history_ms

volumes:
  api-postgres-data:
  history-postgres-data:
  recommendation-postgres-data:
  redis-data:
