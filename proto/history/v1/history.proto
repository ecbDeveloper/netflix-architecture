syntax = "proto3";

package history.v1;

// Preciso que o prefixo do go_package seja o mesmo que do go.mod, para que o
// compilador go entenda corretamente o path para o package history
import "common/v1/common.proto";

service HistoryService {
  rpc RecordWatchHistory(RecordWatchHistoryRequest) returns (RecordWatchHistoryResponse);
  rpc GetWatchHistory(GetWatchHistoryRequest) returns (GetWatchHistoryResponse);
  rpc GetMostWatched(GetMostWatchedRequest) returns (GetMostWatchedResponse);
  rpc GetRecentlyWatched(GetRecentlyWatchedRequest) returns (GetRecentlyWatchedResponse);
  rpc ListWatchHistory(ListWatchHistoryRequest) returns (ListWatchHistoryResponse);
  rpc UpdateWatchProgress(UpdateWatchProgressRequest) returns (UpdateWatchProgressResponse);
  rpc DeleteWatchHistory(DeleteWatchHistoryRequest) returns (DeleteWatchHistoryResponse);
}

message RecordWatchHistoryRequest {
  string profile_id = 1;
  int32 genre_id = 2;
  optional string movie_id = 3;
  optional string episode_id = 4;
  optional int32 last_position_seconds = 5;
  optional bool is_completed = 6;
}

message GetWatchHistoryRequest {
  string id = 1;
  string profile_id = 2;
}

message ListWatchHistoryRequest {
  string profile_id = 1;
}

message UpdateWatchProgressRequest {
  string id = 1;
  string profile_id = 2;
  optional int32 last_position_seconds = 3;
  optional bool is_completed = 4;
}

message DeleteWatchHistoryRequest {
  string id = 1;
  string profile_id = 2;
}

message GetMostWatchedRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message DeleteWatchHistoryResponse {
  bool success = 1;
}

message WatchHistory {
  string id = 1;
  string profile_id = 2;
  optional string movie_id = 3;
  optional string episode_id = 4;
  string watched_at = 5;
  int32 last_position_seconds = 6;
  bool is_completed = 7;
  int32 genre_id = 8;
}

message ListWatchHistoryResponse {
  repeated WatchHistory histories = 1;
}

message GetRecentlyWatchedResponse {
  repeated WatchHistory histories = 1;
}

message RecordWatchHistoryResponse {
  string id = 1;
  string profile_id = 2;
  optional string movie_id = 3;
  optional string episode_id = 4;
  string watched_at = 5;
  int32 last_position_seconds = 6;
  bool is_completed = 7;
  int32 genre_id = 8;
}

message GetWatchHistoryResponse {
  string id = 1;
  string profile_id = 2;
  optional string movie_id = 3;
  optional string episode_id = 4;
  string watched_at = 5;
  int32 last_position_seconds = 6;
  bool is_completed = 7;
  int32 genre_id = 8;
}

message UpdateWatchProgressResponse {
  string id = 1;
  string profile_id = 2;
  optional string movie_id = 3;
  optional string episode_id = 4;
  string watched_at = 5;
  int32 last_position_seconds = 6;
  bool is_completed = 7;
  int32 genre_id = 8;
}

message MostWatchedItem {
  string content_id = 1;
  common.v1.ContentType content_type = 2;
  int32 genre_id = 3;
  int64 watch_count = 4;
}

message GetMostWatchedResponse {
  repeated MostWatchedItem items = 1;
}

message GetRecentlyWatchedRequest {
  string profile_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}
