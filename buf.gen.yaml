version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/ecbDeveloper/netflix-architecture/gen/go

plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: gen/go
    opt:
      - paths=source_relative

  - remote: buf.build/grpc/go:v1.6.2
    out: gen/go
    opt:
      - paths=source_relative

  - remote: buf.build/grpc/python:v1.80.0
    out: gen/python
    include_imports: true

  - remote: buf.build/protocolbuffers/python:v34.1
    out: gen/python
    include_imports: true

  - remote: buf.build/protocolbuffers/pyi:v34.1
    out: gen/python
    include_imports: true

inputs:
  - directory: proto
