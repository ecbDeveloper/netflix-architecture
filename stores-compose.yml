services:
  api_db:
    container_name: api_db
    image: postgres:18-alpine
    ports:
      - ${API_DB_PORT}:5432
    environment:
      POSTGRES_DB: ${API_DB_NAME}
      POSTGRES_USER: ${API_DB_USER}
      POSTGRES_PASSWORD: ${API_DB_PASS}
    volumes:
      - api-postgres-data:/var/lib/postgresql/18/data

  history_db:
    container_name: history_db
    image: postgres:18-alpine
    ports:
      - ${HISTORY_DB_PORT}:5432
    environment:
      POSTGRES_DB: ${HISTORY_DB_NAME}
      POSTGRES_USER: ${HISTORY_DB_USER}
      POSTGRES_PASSWORD: ${HISTORY_DB_PASS}
    volumes:
      - history-postgres-data:/var/lib/postgresql/18/data

  recommendation_db:
    container_name: recommendation_db
    image: postgres:18-alpine
    ports:
      - ${RECOMMENDATION_DB_PORT}:5432
    environment:
      POSTGRES_DB: ${RECOMMENDATION_DB_NAME}
      POSTGRES_USER: ${RECOMMENDATION_DB_USER}
      POSTGRES_PASSWORD: ${RECOMMENDATION_DB_PASS}
    volumes:
      - recommendation-postgres-data:/var/lib/postgresql/18/data

  redis:
    container_name: redis
    image: redis:alpine3.23
    command: redis-server --requirepass ${REDIS_PASS}
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - redis-data:/data

  s3:
    container_name: "rustfs"
    image: rustfs/rustfs:latest
    ports:
      - ${RUSTFS_PORT}:${RUSTFS_PORT}
      - ${RUSTFS_CONSOLE_PORT}:${RUSTFS_CONSOLE_PORT}
    environment:
      - RUSTFS_ADDRESS=0.0.0.0:${RUSTFS_PORT}
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:${RUSTFS_CONSOLE_PORT}
    volumes:
      - rustfs-data:/rustfs/data

volumes:
  api-postgres-data:
  history-postgres-data:
  recommendation-postgres-data:
  redis-data:
  rustfs-data:
